<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: blob: http: https:; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline';" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desktop Pet</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        background: transparent;
        overflow: hidden;
        user-select: none;
        -webkit-app-region: drag;
      }
      #root {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        -webkit-app-region: no-drag;
        pointer-events: none;
      }
      #pet {
        width: 100%;
        height: 100%;
        object-fit: contain;
        image-rendering: pixelated;
        pointer-events: auto;
        -webkit-app-region: drag;
      }
      #pet-video {
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: transparent;
        pointer-events: auto;
        -webkit-app-region: drag;
      }
      #live2d-canvas {
        width: 100%;
        height: 100%;
        pointer-events: auto;
        -webkit-app-region: drag;
      }
      #hud {
        position: absolute;
        left: 10px;
        bottom: 10px;
        z-index: 10;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
        font-size: 12px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.7);
        color: rgba(255, 255, 255, 0.9);
        opacity: 0;
        transition: opacity 180ms ease-in-out;
        pointer-events: none;
      }
      #hud.visible {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <img id="pet" alt="pet" style="display: none;" />
      <video id="pet-video" style="display: none;" autoplay loop muted playsinline></video>
      <canvas id="live2d-canvas" style="display: none; width: 100%; height: 100%;"></canvas>
    </div>
    <div id="hud"></div>
    <script src="./runtime-helpers.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
