<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: blob: http: https:; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline';" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desktop Pet</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        background: transparent;
        overflow: hidden;
        user-select: none;
      }
      #drag {
        position: absolute;
        left: 0;
        top: 0;
        right: 0;
        height: 28px;
      }
      #root {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        -webkit-app-region: drag;
      }
      #pet {
        width: 100%;
        height: 100%;
        object-fit: contain;
        image-rendering: pixelated;
      }
      #pet-video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: transparent;
      pointer-events: none;
    }
    #live2d-canvas {
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
      #hud {
        position: absolute;
        left: 10px;
        bottom: 10px;
        z-index: 10;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
        font-size: 12px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.7);
        color: rgba(255, 255, 255, 0.9);
        opacity: 0;
        transition: opacity 180ms ease-in-out;
        pointer-events: none;
      }
      #hud.visible {
        opacity: 1;
      }
      #controls {
        position: absolute;
        left: 50%;
        bottom: 6px;
        transform: translateX(-50%);
        z-index: 20;
        display: flex;
        gap: 8px;
        -webkit-app-region: no-drag;
        pointer-events: auto;
      }
      #controls button {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.45);
        background: rgba(255, 255, 255, 0.28);
        color: rgba(92, 46, 16, 0.92);
        font-family: "Ma Shan Zheng", "Caveat", "Long Cang", cursive;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.02em;
        padding: 5px 9px;
        min-width: 54px;
        border-radius: 999px;
        box-shadow:
          0 18px 45px -24px rgba(92, 46, 16, 0.45),
          inset 0 6px 18px rgba(255, 255, 255, 0.22);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        cursor: pointer;
        transition:
          transform 120ms ease,
          background 140ms ease,
          border-color 140ms ease,
          opacity 140ms ease,
          box-shadow 140ms ease;
      }
      #controls button:hover {
        background: rgba(255, 255, 255, 0.34);
        border-color: rgba(255, 255, 255, 0.62);
        box-shadow:
          0 20px 50px -24px rgba(92, 46, 16, 0.52),
          inset 0 8px 22px rgba(255, 255, 255, 0.28);
      }
      #controls button:active {
        transform: translateY(1px) scale(0.97);
        background: rgba(255, 255, 255, 0.26);
      }
      #controls button[data-busy="true"] {
        background: rgba(255, 255, 255, 0.38);
        border-color: rgba(255, 255, 255, 0.72);
        color: rgba(92, 46, 16, 1);
        cursor: progress;
        opacity: 0.95;
      }
      #controls button:focus-visible {
        outline: 2px solid rgba(92, 46, 16, 0.7);
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <div id="drag"></div>
    <div id="root">
      <img id="pet" alt="pet" style="display: none;" />
      <video id="pet-video" style="display: none;" autoplay loop muted playsinline></video>
      <canvas id="live2d-canvas" style="display: none; width: 100%; height: 100%;"></canvas>
    </div>
    <div id="controls">
      <button id="btn-play">暂停</button>
      <button id="btn-quit">关闭</button>
    </div>
    <div id="hud"></div>
    <script src="./runtime-helpers.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
