<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>真猫测试 · Hijiki & Tororo · pixi-live2d-display@0.4.0</title>
  <style>
    body {
      margin: 0;
      background: #1a1a2e;
      color: #eee;
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      padding: 20px;
    }
    h1 { color: #ffd166; margin: 0 0 8px; }
    .info { font-size: 14px; color: #9eb6d3; margin-bottom: 16px; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      max-width: 1200px;
    }
    .panel {
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
      padding: 12px;
    }
    .panel h3 { color: #06d6a0; margin: 0 0 8px; font-size: 14px; }
    .canvas-wrap {
      width: 100%;
      height: 400px;
      background: linear-gradient(180deg, #16213e 0%, #0f3460 100%);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }
    .canvas-wrap canvas { width: 100% !important; height: 100% !important; }
    .status { font-size: 12px; color: #9eb6d3; margin-top: 8px; min-height: 24px; }
    .ok { color: #06d6a0; }
    .err { color: #ef476f; }
  </style>
</head>
<body>
  <h1>🐱 真猫 Live2D 模型加载测试（pixi-live2d-display@0.4.0）</h1>
  <div class="info">从 npm <code>live2d-widget-model-hijiki</code> 和 <code>live2d-widget-model-tororo</code> 下载。这是 Live2D 官方 Cubism 2 格式的真猫模型（黑猫 Hijiki + 白猫 Tororo）。</div>

  <div class="grid">
    <div class="panel">
      <h3>🐈‍⬛ Hijiki (黑猫)</h3>
      <div class="canvas-wrap">
        <canvas id="cv-hijiki"></canvas>
      </div>
      <div class="status" id="status-hijiki">⏳ 等待...</div>
    </div>

    <div class="panel">
      <h3>🐱 Tororo (白猫)</h3>
      <div class="canvas-wrap">
        <canvas id="cv-tororo"></canvas>
      </div>
      <div class="status" id="status-tororo">⏳ 等待...</div>
    </div>
  </div>

  <!-- 同时加载 Cubism 2 和 4 Core -->
  <script src="./lib/live2d.min.js"></script>
  <script src="./lib/live2dcubismcore.min.js"></script>
  <!-- pixi-live2d-display 0.4.0：同时支持 Cubism 2 和 Cubism 4 -->
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/index.min.js"></script>

  <script>
    async function loadCat(canvasId, statusId, modelUrl, name) {
      const status = document.getElementById(statusId);
      const canvas = document.getElementById(canvasId);

      try {
        status.innerHTML = `⏳ 创建 PIXI 应用...`;
        const app = new PIXI.Application({
          view: canvas,
          width: canvas.clientWidth,
          height: canvas.clientHeight,
          backgroundColor: 0x16213e,
          resolution: window.devicePixelRatio || 1,
          autoDensity: true,
        });

        status.innerHTML += `<br>⏳ 加载 ${name} ...`;
        const model = await PIXI.live2d.Live2DModel.from(modelUrl, {
          autoInteract: true,
          autoFocus: true,
        });

        // 自适应缩放
        const sw = canvas.clientWidth;
        const sh = canvas.clientHeight;
        const scale = Math.min(sw / model.width, sh / model.height) * 0.9;
        model.scale.set(scale);
        model.x = (sw - model.width * scale) / 2;
        model.y = (sh - model.height * scale) / 2;
        app.stage.addChild(model);

        // 探测内部结构
        const coreModel = model.internalModel && model.internalModel.coreModel;
        let partIds = [];
        let paramIds = [];
        if (coreModel) {
          if (coreModel._partIds) partIds = Array.from(coreModel._partIds);
          else if (coreModel.parts && coreModel.parts._partIds) partIds = Array.from(coreModel.parts._partIds);
          if (coreModel._parameterIds) paramIds = Array.from(coreModel._parameterIds);
          else if (coreModel.parameters && coreModel.parameters._ids) paramIds = Array.from(coreModel.parameters._ids);
        }

        status.innerHTML = `<span class="ok">✅ ${name} 加载成功</span><br>` +
          `📦 Parts: ${partIds.length}<br>🎛️ Parameters: ${paramIds.length}<br>` +
          (partIds.length ? `👀 部件: ${partIds.slice(0, 6).join(', ')}${partIds.length > 6 ? '...' : ''}` : '');
      } catch (err) {
        status.innerHTML = `<span class="err">❌ ${name} 加载失败: ${err.message}</span><br><small>${err.stack || ''}</small>`;
      }
    }

    (async () => {
      await loadCat('cv-hijiki', 'status-hijiki', '/models/free-cats/Hijiki/hijiki.model.json', 'Hijiki 黑猫');
      await loadCat('cv-tororo', 'status-tororo', '/models/free-cats/Tororo/tororo.model.json', 'Tororo 白猫');
    })();
  </script>
</body>
</html>
